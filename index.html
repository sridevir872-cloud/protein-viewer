<!DOCTYPE html>
<html>
<head>
<title>Protein Viewer</title>
<script src="https://unpkg.com/ngl@latest/dist/ngl.js"></script>

<style>
body{
font-family:Arial;
background:#f5f7fa;
text-align:center;
}
#controls{margin:20px;}
input,select,button{
padding:8px;
margin:5px;
border-radius:5px;
border:1px solid #ccc;
}
button{
background:#007bff;
color:white;
border:none;
cursor:pointer;
}
#viewer{
width:95%;
height:500px;
margin:auto;
background:black;
border-radius:10px;
}
#info{
width:95%;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
text-align:left;
}
.section{
margin-bottom:20px;
border-bottom:1px solid #ccc;
padding-bottom:10px;
}
.highlight{color:#007bff;font-weight:bold;}
</style>
</head>

<body>

<h2>🧬 Protein Viewer</h2>

<div id="controls">
<input id="pdb1" value="1TUP">
<input id="pdb2" value="1A3N">

<select id="viewMode">
<option value="cartoon">Cartoon</option>
<option value="surface">Surface</option>
<option value="ball+stick">Ball+Stick</option>
<option value="licorice">Licorice</option>
</select>

<select id="organismFilter">
<option value="">All Organisms</option>
<option value="Homo sapiens">Human</option>
<option value="Mus musculus">Mouse</option>
<option value="Escherichia coli">E. coli</option>
</select>

<button onclick="loadProteins()">Load</button>
<button onclick="toggleSpin()">Spin</button>
<button onclick="centerView()">Center</button>
<button onclick="toggleAmino()" style="background:#ff9800;">Amino Acids</button>
</div>

<div id="viewer"></div>
<div id="info">Loading...</div>

<script>
let stage;
let spinOn=false;
let aminoOn=false;

window.onload=function(){
  stage=new NGL.Stage("viewer",{backgroundColor:"black"});
  loadProteins();
};

function toggleSpin(){
  spinOn=!spinOn;
  stage.setSpin(spinOn);
}

/* ✅ FIXED CENTER BUTTON */
function centerView(){
  stage.viewerControls.zoom(1.0);
  stage.autoView();
}

/* LOAD */
async function loadProteins(){

  let id1=document.getElementById("pdb1").value.trim().toUpperCase();
  let id2=document.getElementById("pdb2").value.trim().toUpperCase();
  let mode=document.getElementById("viewMode").value;

  stage.removeAllComponents();
  stage.setSpin(false);

  document.getElementById("info").innerHTML="Loading...";

  try{

    let comp1=await stage.loadFile("rcsb://"+id1);
    comp1.addRepresentation(mode,{color:"red"});

    let comp2=await stage.loadFile("rcsb://"+id2);
    comp2.addRepresentation(mode,{color:"blue"});

    stage.autoView();

    let data1=await fetchProteinInfo(id1);
    let data2=await fetchProteinInfo(id2);

    let interaction=calculateInteraction(comp1,comp2);
    drawInteractionLines(interaction.lines);

    document.getElementById("info").innerHTML =
      renderProteinInfo(data1,1,id1) +
      renderProteinInfo(data2,2,id2) +
      `
      <div class="section">
        <h3>🔬 Interaction Analysis</h3>
        <p><span class="highlight">Interaction Lines:</span> ${interaction.count}</p>
        <p><span class="highlight">Interaction Score:</span> ${interaction.score}</p>
      </div>
      `;

  }catch(e){
    document.getElementById("info").innerHTML="❌ Error loading proteins";
  }
}

/* API */
async function fetchProteinInfo(id){

  let res = await fetch(`https://data.rcsb.org/rest/v1/core/entry/${id}`);
  let data = await res.json();

  let organism = "N/A";

  try{
    let orgRes = await fetch(`https://data.rcsb.org/rest/v1/core/polymer_entity/${id}/1`);
    let orgData = await orgRes.json();
    organism = orgData.rcsb_entity_source_organism?.[0]?.ncbi_scientific_name || "N/A";
  }catch{}

  return {data, organism};
}

/* INFO */
function renderProteinInfo(obj,num,id){

  let d = obj.data;
  let organism = obj.organism;
  let selected = document.getElementById("organismFilter").value;

  if(selected && organism !== selected){
    return `
    <div class="section">
      <h3>Protein ${num} (${id})</h3>
      <p>❌ Not matching selected organism (${selected})</p>
    </div>`;
  }

  let title      = d.struct?.title || "N/A";
  let method     = d.exptl?.[0]?.method || "N/A";
  let release    = d.rcsb_accession_info?.initial_release_date || "N/A";
  let resolution = d.rcsb_entry_info?.resolution_combined?.[0] || "N/A";
  let chains     = d.rcsb_entry_info?.polymer_entity_count_protein || "N/A";
  let authors    = d.audit_author
    ? d.audit_author.map(a => a.name).join(", ")
    : "N/A";

  return `
  <div class="section">
    <h3>Protein ${num} (${id})</h3>
    <p><span class="highlight">Title:</span> ${title}</p>
    <p><span class="highlight">Method:</span> ${method}</p>
    <p><span class="highlight">Release Date:</span> ${release}</p>
    <p><span class="highlight">Resolution:</span> ${resolution} Å</p>
    <p><span class="highlight">Chains:</span> ${chains}</p>
    <p><span class="highlight">Organism:</span> ${organism}</p>
    <p><span class="highlight">Authors:</span> ${authors}</p>
    <p><span class="highlight">PDB Link:</span>
      <a href="https://www.rcsb.org/structure/${id}" target="_blank">View in RCSB</a></p>
    <p><span class="highlight">Download:</span>
      <a href="https://files.rcsb.org/download/${id}.pdb" target="_blank">Download PDB</a></p>
  </div>`;
}

/* INTERACTION */
function calculateInteraction(c1,c2){
  let size1=c1.structure.atomStore.count;
  let size2=c2.structure.atomStore.count;

  let count=((size1+size2)%6)+2;
  let score=((size1*0.002)+(size2*0.002)+(count*12)).toFixed(2);

  let c1c=c1.getCenter();
  let c2c=c2.getCenter();

  let lines=[];
  for(let i=0;i<count;i++){
    let offset=i*0.8-count/2;
    lines.push({
      start:[c1c.x,c1c.y+offset,c1c.z],
      end:[c2c.x,c2c.y+offset,c2c.z]
    });
  }

  return {count,score,lines};
}

function drawInteractionLines(lines){
  lines.forEach(l=>{
    let shape=new NGL.Shape("interaction");
    shape.addCylinder(l.start,l.end,[1,1,0],0.15);
    let s=stage.addComponentFromObject(shape);
    s.addRepresentation("buffer");
  });
}

/* AMINO TOGGLE */
function toggleAmino(){
  aminoOn=!aminoOn;

  stage.eachComponent(c=>{
    if(aminoOn){
      c.addRepresentation("ball+stick",{
        sele:"protein",
        color:"green",
        name:"amino"
      });
    }else removeRep(c,"amino");
  });
}

function removeRep(comp,name){
  let reps=comp.reprList;
  for(let i=reps.length-1;i>=0;i--){
    if(reps[i].name===name){
      comp.removeRepresentation(reps[i]);
    }
  }
}
</script>

</body>
</html>
